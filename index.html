<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Game</title>
    <link rel="stylesheet" href="styles/app.css" />
  </head>
  <body>
    <div class="toast hidden">
      <p class="toastTop">✅ Correct!</p>
      <p class="toastMain">answer was <span class="tip">HyperText</span></p>
      <div class="progress"></div>
    </div>
    <div class="container">
      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-label">🏆 Score</span>
          <span class="stat-value" id="totalScore">59</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">✅ Done</span>
          <span class="stat-value" id="answeredCount"></span>
          <span class="stat-label">/</span>
          <span class="stat-value" id="totalQuestions"></span>
        </div>
        <div class="progress-ring">
          <div class="progress-bar-bg">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="progress-text" id="progressPercent">0%</span>
        </div>
      </div>
      <div class="cardWrapper">
        <!-- fill with JavaScript -->
      </div>
      <div class="btn-wrapper">
        <button class="btn btnNext" id="nextBtn">Next →</button>
      </div>
    </div>
    <script src="script/app.js" type="module"></script>
  </body>
</html>
